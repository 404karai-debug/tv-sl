<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #0a0a0a;
  color: #fff;
  font-family: Arial;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}
.screen {
  background: #1a1a1a;
  border-radius: 12px;
  padding: 40px;
  width: 320px;
  text-align: center;
  border: 2px solid #333;
}
h1 { color: #e50000; margin-bottom: 30px; font-size: 24px; }
input {
  width: 100%;
  padding: 12px;
  background: #333;
  border: 2px solid #555;
  color: white;
  border-radius: 8px;
  font-size: 16px;
  margin-bottom: 15px;
  text-align: center;
}
input:focus { border-color: #e50000; outline: none; }
button {
  width: 100%;
  padding: 14px;
  margin: 8px 0;
  background: #e50000;
  color: white;
  border: none;
  border-radius: 8px;
  font-size: 16px;
  cursor: pointer;
}
button:hover { background: #ff3333; }
#error { color: #ff6666; margin-top: 10px; font-size: 14px; }
.hidden { display: none; }
</style>
</head>
<body>

<!-- ÉCRAN LOGIN -->
<div class="screen" id="loginScreen">
  <h1>📺 TV IPTV</h1>
  <p style="margin-bottom:20px; color:#aaa;">Entrez votre code utilisateur</p>
  <input type="text" id="codeInput" placeholder="Username..." />
  <button onclick="valider()">✅ VALIDER</button>
  <p id="error"></p>
</div>

<!-- ÉCRAN MENU -->
<div class="screen hidden" id="menuScreen">
  <h1>📺 MA TV</h1>
  <p style="margin-bottom:20px; color:#aaa;" id="userInfo"></p>
  <button onclick="ouvrirSection('live')">📺 TV Direct</button>
  <button onclick="ouvrirSection('vod')">🎬 Films</button>
  <button onclick="ouvrirSection('series')">🎭 Séries</button>
  <button onclick="deconnecter()" style="background:#444; margin-top:20px;">🚪 Déconnexion</button>
</div>

<script>
let g_server = "usica.online";
let g_user = "";
let g_pass = "1593574628";

function valider() {
  let code = document.getElementById('codeInput').value.trim();

  if (code.length < 3) {
    document.getElementById('error').textContent = "❌ Code trop court !";
    return;
  }

  g_user = code;

  let url = `https://corsproxy.io/?http://${g_server}/player_api.php?username=${g_user}&password=${g_pass}`;

  fetch(url)
    .then(r => r.json())
    .then(data => {
      if (data.user_info && data.user_info.auth == 1) {
        document.getElementById('userInfo').textContent = "👤 " + g_user;
        document.getElementById('loginScreen').classList.add('hidden');
        document.getElementById('menuScreen').classList.remove('hidden');
      } else {
        document.getElementById('error').textContent = "❌ Code invalide !";
      }
    })
    .catch(() => {
      document.getElementById('error').textContent = "❌ Erreur connexion !";
    });
}

function ouvrirSection(type) {
  alert("Section : " + type + "\nServeur : " + g_server + "\nUser : " + g_user);
}

function deconnecter() {
  document.getElementById('loginScreen').classList.remove('hidden');
  document.getElementById('menuScreen').classList.add('hidden');
  document.getElementById('codeInput').value = '';
  document.getElementById('error').textContent = '';
}
</script>

</body>
</html>
