<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📺 IPTV</title>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #0d0d0d; color: #fff; font-family: Arial, sans-serif; }

#loginScreen {
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  height: 100vh;
  background: linear-gradient(135deg, #0d0d0d, #1a0000);
}
.login-box {
  background: #1a1a1a; border: 2px solid #e50000;
  border-radius: 16px; padding: 50px 40px;
  width: 360px; text-align: center;
}
.login-box h1 { color: #e50000; font-size: 28px; margin-bottom: 10px; }
.login-box p { color: #aaa; margin-bottom: 30px; font-size: 14px; }
.login-box input {
  width: 100%; padding: 14px;
  background: #2a2a2a; border: 2px solid #444;
  color: white; border-radius: 8px;
  font-size: 16px; margin-bottom: 15px; text-align: center;
}
.login-box input:focus { border-color: #e50000; outline: none; }
.btn-red {
  width: 100%; padding: 14px; background: #e50000;
  color: white; border: none; border-radius: 8px;
  font-size: 16px; cursor: pointer;
}
.btn-red:hover { background: #ff2222; }
#loginError { color: #ff6666; margin-top: 12px; font-size: 14px; min-height: 20px; }

#appScreen { display: none; flex-direction: column; height: 100vh; overflow: hidden; }

#navbar {
  display: flex; align-items: center; gap: 10px;
  background: #111; border-bottom: 2px solid #e50000;
  padding: 10px 20px; flex-shrink: 0;
}
#navbar h2 { color: #e50000; margin-right: 20px; }
.nav-btn {
  padding: 8px 20px; border-radius: 20px;
  border: 2px solid #333; background: transparent;
  color: #aaa; cursor: pointer; font-size: 14px;
}
.nav-btn.active, .nav-btn:hover { background: #e50000; border-color: #e50000; color: white; }
#btnDeconnect {
  margin-left: auto; padding: 8px 16px;
  background: #333; border: none; color: #aaa;
  border-radius: 8px; cursor: pointer;
}

#mainContent { display: flex; flex: 1; overflow: hidden; }

#sidebar {
  width: 220px; background: #111;
  border-right: 1px solid #222;
  overflow-y: auto; flex-shrink: 0;
}
#sidebar h3 { padding: 15px; color: #e50000; font-size: 13px; text-transform: uppercase; }
.cat-item {
  padding: 12px 15px; cursor: pointer;
  border-bottom: 1px solid #1a1a1a;
  font-size: 14px; color: #ccc;
}
.cat-item:hover, .cat-item.active { background: #e50000; color: white; }

#contentArea { flex: 1; overflow-y: auto; padding: 20px; }

.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 15px; }
.card {
  background: #1a1a1a; border-radius: 10px;
  overflow: hidden; cursor: pointer;
  transition: transform 0.2s;
}
.card:hover { transform: scale(1.04); }
.card img { width: 100%; height: 220px; object-fit: cover; background: #222; }
.card-info { padding: 10px; }
.card-title { font-size: 13px; font-weight: bold; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.card-meta { font-size: 11px; color: #aaa; margin-top: 4px; }
.card-play {
  width: 100%; margin-top: 8px; padding: 8px;
  background: #e50000; color: white; border: none;
  border-radius: 6px; cursor: pointer; font-size: 13px;
}

.list { display: flex; flex-direction: column; gap: 8px; }
.list-item {
  display: flex; align-items: center; gap: 15px;
  background: #1a1a1a; border-radius: 10px;
  padding: 12px 15px; cursor: pointer;
}
.list-item:hover { background: #2a2a2a; }
.list-item img { width: 50px; height: 50px; object-fit: contain; border-radius: 6px; background: #222; }
.list-item-info { flex: 1; }
.list-item-name { font-size: 15px; font-weight: bold; }
.list-item-epg { font-size: 12px; color: #e50000; margin-top: 3px; }
.list-item-play {
  padding: 8px 16px; background: #e50000;
  color: white; border: none; border-radius: 8px;
  cursor: pointer; font-size: 13px;
}

#playerOverlay {
  display: none; position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.95);
  z-index: 1000; flex-direction: column;
  align-items: center; justify-content: center;
}
#playerOverlay.show { display: flex; }
#playerTitle {
  color: white; font-size: 20px;
  margin-bottom: 15px; text-align: center;
}
#playerVideo {
  width: 90vw; max-width: 1200px;
  height: 55vw; max-height: 675px;
  background: #000; border-radius: 10px;
}
#playerClose {
  margin-top: 15px; padding: 10px 30px;
  background: #e50000; color: white;
  border: none; border-radius: 8px;
  font-size: 16px; cursor: pointer;
}

#serieModal {
  display: none; position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.9);
  z-index: 999; overflow-y: auto;
  padding: 40px 20px;
}
#serieModal.show { display: block; }
#serieModalContent {
  max-width: 800px; margin: 0 auto;
  background: #1a1a1a; border-radius: 16px;
  padding: 30px;
}
#serieModalContent h2 { color: #e50000; margin-bottom: 20px; }
.season-btn {
  padding: 8px 16px; margin: 4px;
  background: #333; border: none; color: white;
  border-radius: 6px; cursor: pointer;
}
.season-btn.active { background: #e50000; }
.episode-item {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px; background: #222; border-radius: 8px; margin: 6px 0;
}
.episode-play {
  padding: 6px 14px; background: #e50000;
  color: white; border: none; border-radius: 6px; cursor: pointer;
}
#serieClose {
  margin-top: 20px; padding: 10px 30px;
  background: #555; color: white; border: none;
  border-radius: 8px; cursor: pointer; font-size: 16px;
}

#loader {
  text-align: center; padding: 60px;
  color: #aaa; font-size: 18px;
}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="login-box">
    <h1>📺 IPTV</h1>
    <p>Entrez votre code d'accès</p>
    <input type="text" id="codeInput" placeholder="Votre username..." autocomplete="off" />
    <button class="btn-red" onclick="valider()">▶ Connexion</button>
    <div id="loginError"></div>
  </div>
</div>

<!-- APP -->
<div id="appScreen">
  <div id="navbar">
    <h2>📺 IPTV</h2>
    <button class="nav-btn active" onclick="setMode('tv', this)">📡 TV Direct</button>
    <button class="nav-btn" onclick="setMode('films', this)">🎬 Films</button>
    <button class="nav-btn" onclick="setMode('series', this)">📺 Séries</button>
    <button id="btnDeconnect" onclick="deconnecter()">⏻ Déconnexion</button>
  </div>
  <div id="mainContent">
    <div id="sidebar">
      <h3>📂 Catégories</h3>
      <div id="catList"></div>
    </div>
    <div id="contentArea">
      <div id="loader">⏳ Chargement...</div>
    </div>
  </div>
</div>

<!-- LECTEUR -->
<div id="playerOverlay">
  <div id="playerTitle"></div>
  <video id="playerVideo" controls autoplay></video>
  <button id="playerClose" onclick="fermerLecteur()">✖ Fermer</button>
</div>

<!-- MODAL SERIE -->
<div id="serieModal">
  <div id="serieModalContent">
    <h2 id="serieTitre"></h2>
    <div id="serieSaisons"></div>
    <div id="serieEpisodes"></div>
    <button id="serieClose" onclick="fermerSerie()">✖ Fermer</button>
  </div>
</div>

<script>
// ===== CONFIG =====
const SERVER = "usica.online";
const PORT = "80";
const PASS = "1593574628";
const PROXY = "https://api.codetabs.com/v1/proxy?quest=";

let USER = "";
let currentMode = "tv";
let currentCat = "all";
let epgData = {};
let hlsPlayer = null;

// ===== HELPER FETCH =====
async function apiFetch(urlApi) {
  let r = await fetch(PROXY + encodeURIComponent(urlApi));
  if (!r.ok) throw new Error("HTTP " + r.status);
  return await r.json();
}

// ===== LOGIN =====
async function valider() {
  let code = document.getElementById('codeInput').value.trim();
  if (code.length < 2) {
    document.getElementById('loginError').textContent = "❌ Entrez votre username !";
    return;
  }

  USER = code;
  document.getElementById('loginError').textContent = "⏳ Connexion...";

  try {
    let data = await apiFetch(`http://${SERVER}:${PORT}/player_api.php?username=${USER}&password=${PASS}`);
    console.log("Auth response:", data);

    if (data.user_info) {
      lancerApp();
    } else {
      document.getElementById('loginError').textContent = "❌ Username incorrect !";
      USER = "";
    }
  } catch(e) {
    console.error(e);
    document.getElementById('loginError').textContent = "❌ Erreur connexion : " + e.message;
    USER = "";
  }
}

// ===== LANCER APP =====
function lancerApp() {
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('appScreen').style.display = 'flex';
  setMode('tv', document.querySelector('.nav-btn'));
}

// ===== NAVIGATION =====
function setMode(mode, btn) {
  currentMode = mode;
  currentCat = "all";
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
  chargerCategories();
}

// ===== CATÉGORIES =====
async function chargerCategories() {
  document.getElementById('catList').innerHTML = '<div style="padding:15px;color:#aaa">⏳</div>';

  let action = currentMode === 'tv' ? 'get_live_categories'
             : currentMode === 'films' ? 'get_vod_categories'
             : 'get_series_categories';

  try {
    let cats = await apiFetch(`http://${SERVER}:${PORT}/player_api.php?username=${USER}&password=${PASS}&action=${action}`);

    let html = `<div class="cat-item ${currentCat==='all'?'active':''}" onclick="selectCat('all', this)">📋 Toutes</div>`;
    cats.forEach(c => {
      html += `<div class="cat-item" onclick="selectCat('${c.category_id}', this)">${c.category_name}</div>`;
    });
    document.getElementById('catList').innerHTML = html;

    chargerContenu();
    if (currentMode === 'tv') chargerEPG();

  } catch(e) {
    document.getElementById('catList').innerHTML = '<div style="padding:15px;color:#f66">❌ Erreur</div>';
  }
}

function selectCat(id, el) {
  currentCat = id;
  document.querySelectorAll('.cat-item').forEach(e => e.classList.remove('active'));
  el.classList.add('active');
  chargerContenu();
}

// ===== CONTENU =====
async function chargerContenu() {
  document.getElementById('contentArea').innerHTML = '<div id="loader">⏳ Chargement...</div>';

  let action = currentMode === 'tv' ? 'get_live_streams'
             : currentMode === 'films' ? 'get_vod_streams'
             : 'get_series';

  let urlApi = `http://${SERVER}:${PORT}/player_api.php?username=${USER}&password=${PASS}&action=${action}`;
  if (currentCat !== 'all') urlApi += `&category_id=${currentCat}`;

  try {
    let items = await apiFetch(urlApi);
    if (currentMode === 'tv') afficherTV(items);
    else if (currentMode === 'films') afficherFilms(items);
    else afficherSeries(items);
  } catch(e) {
    document.getElementById('contentArea').innerHTML = `<div style="padding:40px;color:#f66">❌ Erreur: ${e.message}</div>`;
  }
}

// ===== TV =====
function afficherTV(items) {
  if (!items.length) { document.getElementById('contentArea').innerHTML = '<div style="padding:40px;color:#aaa">Aucune chaîne</div>'; return; }
  let html = '<div class="list">';
  items.forEach(ch => {
    let epg = epgData[ch.epg_channel_id] ? `🔴 ${epgData[ch.epg_channel_id]}` : '';
    html += `
      <div class="list-item">
        <img src="${ch.stream_icon}" onerror="this.src=''" alt="">
        <div class="list-item-info">
          <div class="list-item-name">${ch.name}</div>
          <div class="list-item-epg">${epg}</div>
        </div>
        <button class="list-item-play" onclick="jouerLive(${ch.stream_id},'${escQ(ch.name)}')">▶ Play</button>
      </div>`;
  });
  html += '</div>';
  document.getElementById('contentArea').innerHTML = html;
}

// ===== FILMS =====
function afficherFilms(items) {
  if (!items.length) { document.getElementById('contentArea').innerHTML = '<div style="padding:40px;color:#aaa">Aucun film</div>'; return; }
  let html = '<div class="grid">';
  items.forEach(f => {
    html += `
      <div class="card">
        <img src="${f.stream_icon}" onerror="this.style.height='60px'" alt="">
        <div class="card-info">
          <div class="card-title">${f.name}</div>
          <div class="card-meta">⭐ ${f.rating || '?'} • ${f.added ? new Date(f.added*1000).getFullYear() : ''}</div>
          <button class="card-play" onclick="jouerFilm(${f.stream_id},'${escQ(f.name)}')">▶ Play</button>
        </div>
      </div>`;
  });
  html += '</div>';
  document.getElementById('contentArea').innerHTML = html;
}

// ===== SERIES =====
function afficherSeries(items) {
  if (!items.length) { document.getElementById('contentArea').innerHTML = '<div style="padding:40px;color:#aaa">Aucune série</div>'; return; }
  let html = '<div class="grid">';
  items.forEach(s => {
    html += `
      <div class="card">
        <img src="${s.cover}" onerror="this.style.height='60px'" alt="">
        <div class="card-info">
          <div class="card-title">${s.name}</div>
          <div class="card-meta">⭐ ${s.rating || '?'}</div>
          <button class="card-play" onclick="ouvrirSerie(${s.series_id},'${escQ(s.name)}')">▶ Voir</button>
        </div>
      </div>`;
  });
  html += '</div>';
  document.getElementById('contentArea').innerHTML = html;
}

// ===== JOUER LIVE =====
function jouerLive(id, nom) {
  let url = `http://${SERVER}:${PORT}/live/${USER}/${PASS}/${id}.m3u8`;
  ouvrirLecteur(url, nom);
}

// ===== JOUER FILM =====
function jouerFilm(id, nom) {
  let url = `http://${SERVER}:${PORT}/movie/${USER}/${PASS}/${id}.mp4`;
  ouvrirLecteur(url, nom);
}

// ===== SERIE =====
async function ouvrirSerie(id, nom) {
  document.getElementById('serieTitre').textContent = nom;
  document.getElementById('serieSaisons').innerHTML = '⏳ Chargement...';
  document.getElementById('serieEpisodes').innerHTML = '';
  document.getElementById('serieModal').classList.add('show');

  try {
    let data = await apiFetch(`http://${SERVER}:${PORT}/player_api.php?username=${USER}&password=${PASS}&action=get_series_info&series_id=${id}`);

    let saisons = Object.keys(data.episodes || {});
    if (!saisons.length) {
      document.getElementById('serieSaisons').innerHTML = '<p style="color:#aaa">Aucun épisode</p>';
      return;
    }

    let html = '<div style="margin-bottom:15px">';
    saisons.forEach(s => {
      html += `<button class="season-btn" onclick="afficherEpisodes(this, ${JSON.stringify(data.episodes[s])}, '${escQ(nom)}')">${s}</button>`;
    });
    html += '</div>';
    document.getElementById('serieSaisons').innerHTML = html;

    afficherEpisodes(document.querySelector('.season-btn'), data.episodes[saisons[0]], nom);

  } catch(e) {
    document.getElementById('serieSaisons').innerHTML = `<p style="color:#f66">❌ ${e.message}</p>`;
  }
}

function afficherEpisodes(btn, episodes, nomSerie) {
  document.querySelectorAll('.season-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');

  let html = '';
  episodes.forEach(ep => {
    html += `
      <div class="episode-item">
        <span>S${ep.season}E${ep.episode_num} - ${ep.title || 'Episode '+ep.episode_num}</span>
        <button class="episode-play" onclick="jouerEpisode(${ep.id},'${escQ(nomSerie+' S'+ep.season+'E'+ep.episode_num)}','${ep.container_extension}')">▶</button>
      </div>`;
  });
  document.getElementById('serieEpisodes').innerHTML = html;
}

function jouerEpisode(id, nom, ext) {
  let url = `http://${SERVER}:${PORT}/series/${USER}/${PASS}/${id}.${ext||'mp4'}`;
  fermerSerie();
  ouvrirLecteur(url, nom);
}

// ===== LECTEUR =====
function ouvrirLecteur(url, titre) {
  document.getElementById('playerTitle').textContent = titre;
  document.getElementById('playerOverlay').classList.add('show');

  let video = document.getElementById('playerVideo');
  if (hlsPlayer) { hlsPlayer.destroy(); hlsPlayer = null; }

  let urlProxied = PROXY + encodeURIComponent(url);
  let isMP4 = url.includes('.mp4') || url.includes('/movie/');
  let isTS = url.includes('.ts');

  if (isMP4 || isTS) {
    // Lecture directe via proxy
    video.src = urlProxied;
    video.play();
  } else if (Hls.isSupported()) {
    // Stream HLS (.m3u8)
    hlsPlayer = new Hls({
      xhrSetup: function(xhr, url) {
        if (!url.startsWith('https://api.codetabs.com')) {
          xhr.open('GET', PROXY + encodeURIComponent(url), true);
        }
      }
    });
    hlsPlayer.loadSource(urlProxied);
    hlsPlayer.attachMedia(video);
    hlsPlayer.on(Hls.Events.MANIFEST_PARSED, () => video.play());
    hlsPlayer.on(Hls.Events.ERROR, (event, data) => {
      console.error('HLS error', data);
      if (data.fatal) {
        // Fallback lecture directe
        video.src = urlProxied;
        video.play();
      }
    });
  } else {
    video.src = urlProxied;
    video.play();
  }
}


function fermerLecteur() {
  document.getElementById('playerOverlay').classList.remove('show');
  let video = document.getElementById('playerVideo');
  video.pause();
  video.src = '';
  if (hlsPlayer) { hlsPlayer.destroy(); hlsPlayer = null; }
}

function fermerSerie() {
  document.getElementById('serieModal').classList.remove('show');
}

// ===== EPG =====
async function chargerEPG() {
  try {
    let data = await apiFetch(`http://${SERVER}:${PORT}/player_api.php?username=${USER}&password=${PASS}&action=get_short_epg&limit=2`);
    if (data.epg_listings) {
      data.epg_listings.forEach(e => {
        try { epgData[e.channel_id] = atob(e.title); } catch(x) {}
      });
    }
  } catch(e) {}
  setTimeout(chargerEPG, 5 * 60 * 1000);
}

// ===== UTILS =====
function escQ(s) { return (s||'').replace(/'/g,"\\'").replace(/"/g,'\\"'); }

document.getElementById('codeInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') valider();
});

// ===== DÉCONNEXION =====
function deconnecter() {
  USER = '';
  document.getElementById('appScreen').style.display = 'none';
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('codeInput').value = '';
  document.getElementById('loginError').textContent = '';
  fermerLecteur();
}
</script>
</body>
</html>
